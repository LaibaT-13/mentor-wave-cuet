<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mentor Wave CUET</title>
    <style>
        /* --- THEME COLORS --- */
        :root {
            --sidebar-bg: #4B3628;           /* Dark Brown */
            --sidebar-active: #6E7B5B;       /* Olive */
            --sidebar-text: #F3E6D6;         /* Champagne */
            --main-bg: #FFFFFF;              /* White */
            --card-bg: #EAD8C0;              /* Beige */
            --card-heading: #3A2F2A;         /* Anthrazit */
            --divider: #B17843;              /* Caramel */
            --input-bg: #F7F1E8;             /* Light */
            --input-border: #C4B7A6;         /* Greige */
            --input-focus: #A45A3F;          /* Terracotta */
            --btn-primary: #A45A3F;          /* Terracotta */
            --btn-hover: #B17843;            /* Caramel */
            --btn-text: #FFFFFF;             /* White */
            --gold: #D4AF37;                 /* Gold Icons */
            --border-color: #C4B7A6;         /* Greige */
            --body-text: #3A2F2A;            /* Dark text */
            --sec-color: #6B6B6B;            /* Secondary text */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            color: var(--body-text);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        .header {
            background-color: var(--sidebar-bg);
            padding: 15px 0;
            text-align: center;
            border-bottom: 6px solid var(--divider);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav-brand h2 {
            color: var(--sidebar-text);
            font-size: 24px;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .nav-brand a {
            text-decoration: none;
            color: inherit;
        }

        .nav-menu { display: none; }

        /* --- AUTH SECTION --- */
        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            padding: 20px;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 12px;
            border: 5px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 580px;
            text-align: center;
        }

        .auth-info { display: none; }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--card-heading);
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: var(--sec-color);
            font-size: 16px;
            margin-bottom: 35px;
        }

        /* --- FORM STYLING --- */
        .auth-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--card-heading);
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--body-text);
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--input-focus);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(164, 90, 63, 0.1);
        }

        .form-hint {
            display: block;
            font-size: 12px;
            color: var(--sec-color);
            margin-top: 5px;
        }

        /* --- ROLE TABS --- */
        .role-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            border-bottom: 5px solid var(--input-border);
            padding-bottom: 0;
        }

        .role-tab {
            flex: 1;
            padding: 16px 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 700;
            color: var(--sec-color);
            cursor: pointer;
            border-bottom: 5px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -5px;
        }

        .role-tab.active {
            color: var(--btn-primary);
            border-bottom-color: var(--btn-primary);
        }

        .role-tab:hover:not(.active) {
            color: var(--card-heading);
        }

        /* --- RADIO & CHECKBOX --- */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-label, .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: var(--body-text);
        }

        .radio-label input[type="radio"],
        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
            accent-color: var(--btn-primary);
            border-width: 2px;
        }

        .checkbox-label a {
            color: var(--btn-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* --- PASSWORD WRAPPER --- */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--card-heading);
        }

        /* --- BUTTON --- */
        .btn-primary {
            background-color: var(--btn-primary);
            color: var(--btn-text);
            border: none;
            padding: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(164, 90, 63, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--btn-hover);
            box-shadow: 0 6px 16px rgba(164, 90, 63, 0.4);
            transform: translateY(-2px);
        }

        .btn-block {
            width: 100%;
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 2px solid #fcc;
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 15px;
            color: var(--sec-color);
            text-align: center;
            padding-top: 20px;
            border-top: 4px solid var(--border-color);
        }

        .auth-footer a {
            color: var(--btn-primary);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        .footer-minimal {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--sec-color);
            border-top: 4px solid var(--border-color);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .auth-card {
                padding: 35px 25px;
                max-width: 100%;
                border-width: 4px;
            }

            h1 {
                font-size: 28px;
            }

            .role-tabs {
                flex-direction: column;
                border-bottom: none;
                border-left: 5px solid var(--input-border);
                padding-left: 0;
            }

            .role-tab {
                text-align: left;
                border-bottom: none;
                border-left: 5px solid transparent;
                padding-left: 15px;
                margin-bottom: 0;
            }

            .role-tab.active {
                border-left-color: var(--btn-primary);
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a href="index.html"><h2>🎓 Mentor Wave CUET</h2></a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Registration Form Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <h1>Create Account</h1>
                    <p class="auth-subtitle">Join Mentor Wave CUET today</p>

                    <!-- Role Selection Tabs -->
                    <div class="role-tabs">
                        <button class="role-tab active" data-role="tutor">Tutor</button>
                        <button class="role-tab" data-role="guardian">Guardian</button>
                    </div>

                    <!-- Tutor Registration Form -->
                    <form id="tutorRegisterForm" class="auth-form">
                        <input type="hidden" name="role" value="tutor">

                        <!-- Full Name -->
                        <div class="form-group">
                            <label for="tutorName">Full Name *</label>
                            <input 
                                type="text" 
                                id="tutorName" 
                                name="name" 
                                placeholder="Enter your full name"
                                required
                            >
                        </div>

                        <!-- CUET Email -->
                        <div class="form-group">
                            <label for="tutorEmail">CUET Email Address *</label>
                            <input 
                                type="email" 
                                id="tutorEmail" 
                                name="email" 
                                placeholder="yourname@student.cuet.ac.bd"
                                pattern="[a-zA-Z0-9._%+-]+@student\.cuet\.ac\.bd$"
                                required
                            >
                            <small class="form-hint">Must be a valid @student.cuet.ac.bd email</small>
                        </div>

                        <!-- Student ID -->
                        <div class="form-group">
                            <label for="studentId">Student ID *</label>
                            <input 
                                type="text" 
                                id="studentId" 
                                name="studentId" 
                                placeholder="e.g., 1904XXX"
                                required
                            >
                        </div>

                        <!-- Department -->
                        <div class="form-group">
                            <label for="department">Department *</label>
                            <select id="department" name="department" required>
                                <option value="">Select Department</option>
                                <option value="CSE">Computer Science & Engineering</option>
                                <option value="EEE">Electrical & Electronic Engineering</option>
                                <option value="ME">Mechanical Engineering</option>
                                <option value="CE">Civil Engineering</option>
                                <option value="URP">Urban & Regional Planning</option>
                                <option value="ARCH">Architecture</option>
                                <option value="IPE">Industrial & Production Engineering</option>
                                <option value="ChE">Chemical Engineering</option>
                                <option value="MME">Materials & Metallurgical Engineering</option>
                                <option value="PME">Petroleum & Mining Engineering</option>
                            </select>
                        </div>

                        <!-- Phone -->
                        <div class="form-group">
                            <label for="tutorPhone">Phone Number *</label>
                            <input 
                                type="tel" 
                                id="tutorPhone" 
                                name="phone" 
                                placeholder="+880 1XXX-XXXXXX"
                                pattern="[0-9+\s-]+"
                                required
                            >
                        </div>

                        <!-- Gender -->
                        <div class="form-group">
                            <label>Gender *</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="gender" value="male" required>
                                    <span>Male</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="gender" value="female" required>
                                    <span>Female</span>
                                </label>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <label for="tutorPassword">Password *</label>
                            <div class="password-wrapper">
                                <input 
                                    type="password" 
                                    id="tutorPassword" 
                                    name="password" 
                                    placeholder="Minimum 8 characters"
                                    minlength="8"
                                    required
                                >
                                <button type="button" class="password-toggle" aria-label="Show password" data-target="tutorPassword">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-group">
                            <label for="tutorConfirmPassword">Confirm Password *</label>
                            <div class="password-wrapper">
                                <input 
                                    type="password" 
                                    id="tutorConfirmPassword" 
                                    name="confirmPassword" 
                                    placeholder="Re-enter password"
                                    required
                                >
                                <button type="button" class="password-toggle" aria-label="Show password" data-target="tutorConfirmPassword">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Terms -->
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="terms" required>
                                <span>I agree to the <a href="#">Terms & Conditions</a></span>
                            </label>
                        </div>

                        <!-- Error Message -->
                        <div id="tutorRegisterError" class="error-message" style="display: none;"></div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-block">Register as Tutor</button>
                    </form>

                    <!-- Guardian Registration Form -->
                    <form id="guardianRegisterForm" class="auth-form" style="display: none;">
                        <input type="hidden" name="role" value="guardian">

                        <!-- Full Name -->
                        <div class="form-group">
                            <label for="guardianName">Full Name *</label>
                            <input 
                                type="text" 
                                id="guardianName" 
                                name="name" 
                                placeholder="Enter your full name"
                                required
                            >
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label for="guardianEmail">Email Address *</label>
                            <input 
                                type="email" 
                                id="guardianEmail" 
                                name="email" 
                                placeholder="your.email@example.com"
                                required
                            >
                        </div>

                        <!-- Phone -->
                        <div class="form-group">
                            <label for="guardianPhone">Phone Number *</label>
                            <input 
                                type="tel" 
                                id="guardianPhone" 
                                name="phone" 
                                placeholder="+880 1XXX-XXXXXX"
                                pattern="[0-9+\s-]+"
                                required
                            >
                        </div>

                        <!-- Location -->
                        <div class="form-group">
                            <label for="location">Location *</label>
                            <input 
                                type="text" 
                                id="location" 
                                name="location" 
                                placeholder="City, Area"
                                required
                            >
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <label for="guardianPassword">Password *</label>
                            <div class="password-wrapper">
                                <input 
                                    type="password" 
                                    id="guardianPassword" 
                                    name="password" 
                                    placeholder="Minimum 8 characters"
                                    minlength="8"
                                    required
                                >
                                <button type="button" class="password-toggle" aria-label="Show password" data-target="guardianPassword">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-group">
                            <label for="guardianConfirmPassword">Confirm Password *</label>
                            <div class="password-wrapper">
                                <input 
                                    type="password" 
                                    id="guardianConfirmPassword" 
                                    name="confirmPassword" 
                                    placeholder="Re-enter password"
                                    required
                                >
                                <button type="button" class="password-toggle" aria-label="Show password" data-target="guardianConfirmPassword">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Terms -->
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="terms" required>
                                <span>I agree to the <a href="#">Terms & Conditions</a></span>
                            </label>
                        </div>

                        <!-- Error Message -->
                        <div id="guardianRegisterError" class="error-message" style="display: none;"></div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-block">Register as Guardian</button>
                    </form>

                    <div class="auth-footer">
                        <p>Already have an account? <a href="login.html">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer footer-minimal">
        <div class="container">
            <p>&copy; 2026 Mentor Wave CUET. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
