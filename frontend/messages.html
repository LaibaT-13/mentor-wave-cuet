<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Mentor Wave CUET</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .messaging-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- CONVERSATIONS SIDEBAR --- */
        .conversations-sidebar {
            width: 320px;
            background-color: #fff;
            border-right: 1px solid #e5e5ea;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .conversations-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e5ea;
        }

        .conversations-header h2 {
            font-size: 28px;
            font-weight: 800;
            color: #000;
            margin-bottom: 12px;
        }

        .search-box {
            width: 100%;
            padding: 8px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 20px;
            background-color: #f0f0f0;
            font-size: 15px;
            outline: none;
        }

        .search-box:focus {
            background-color: #ffffff;
            border-color: #007AFF;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .conversation-item {
            padding: 8px 8px;
            margin: 0 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .conversation-item:hover {
            background-color: #f5f5f5;
        }

        .conversation-item.active {
            background-color: #e5e5ea;
        }

        .conv-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
            position: relative;
        }

        .conv-avatar.av2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .conv-avatar.av3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .conv-avatar.av4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .conv-avatar.av5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

        .conv-online-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            background-color: #31a24c;
            border: 3px solid white;
            border-radius: 50%;
        }

        .conv-content {
            flex: 1;
            min-width: 0;
        }

        .conv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .conv-name {
            font-weight: 600;
            color: #000;
            font-size: 15px;
        }

        .conv-time {
            font-size: 13px;
            color: #999;
        }

        .conv-preview {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- CHAT AREA --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f9f9f9;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: #000;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #999;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #fff;
        }

        .message-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message-group.sent {
            justify-content: flex-end;
        }

        .message {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            max-width: 70%;
        }

        .message.received {
            background-color: #e5e5ea;
            color: #000;
        }

        .message.sent {
            background-color: #31a24c;
            color: white;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            display: block;
        }

        /* --- INPUT AREA --- */
        .chat-input-container {
            padding: 12px 20px;
            background-color: #fff;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input-form {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
            resize: none;
            background-color: #f0f0f0;
            font-size: 15px;
        }

        .chat-input:focus {
            background-color: #ffffff;
            border-color: #007AFF;
        }

        .send-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #007AFF;
        }

        .send-btn:hover {
            opacity: 0.7;
        }

        #backDashboardLink {
            background: none;
            border: none;
            color: #007AFF;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        #backDashboardLink:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="messaging-container">
        <!-- Conversations Sidebar -->
        <aside class="conversations-sidebar">
            <div class="conversations-header">
                <h2>Messages</h2>
                <input type="text" class="search-box" placeholder="Search...">
            </div>
            <div class="conversations-list" id="conversationsList">
                <p style="text-align:center;color:#999;padding:20px;font-size:13px;">Loading conversations...</p>
            </div>
        </aside>

        <!-- Chat Area -->
        <div class="chat-area">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-avatar" id="activeChatAvatar">?</div>
                    <div class="chat-header-info">
                        <h3 id="activeChatName">Select a conversation</h3>
                        <p id="activeChatStatus">—</p>
                    </div>
                </div>
                <a href="#" id="backDashboardLink" style="background: none; border: none; color: #007AFF; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 14px; font-weight: 600; text-decoration: none;">Back to Dashboard</a>
            </header>

            <div class="chat-messages" id="chatMessages" style="display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;">Select a conversation to start chatting</div>

            <div class="chat-input-container">
                <form class="chat-input-form" id="messageForm">
                    <textarea class="chat-input" id="messageInput" placeholder="Aa" rows="1"></textarea>
                    <button type="submit" class="send-btn">📤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Back to Dashboard - role aware
        document.getElementById('backDashboardLink').addEventListener('click', (e) => {
            e.preventDefault();
            try {
                const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
                if (user.role === 'guardian') window.location.href = 'guardian/dashboard.html';
                else if (user.role === 'admin') window.location.href = 'admin/dashboard.html';
                else window.location.href = 'tutor/dashboard.html';
            } catch(err) {
                window.location.href = 'tutor/dashboard.html';
            }
        });
    </script>
</body>
</html>
