<?xml version="1.0" encoding="UTF-8"?>
<!-- Simple educational cover SVG used as a decorative hero background -->
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="900" viewBox="0 0 2400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f4c81" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2a6fcb" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="2400" height="900" fill="url(#g1)" />

  <!-- Subtle pattern of books -->
  <g transform="translate(120,110)" opacity="0.12">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#fff" />
    <rect x="20" y="24" width="260" height="12" fill="#0f4c81" />
    <rect x="20" y="48" width="200" height="12" fill="#2a6fcb" />
    <rect x="360" y="40" width="320" height="210" rx="12" fill="#fff" />
    <rect x="380" y="64" width="280" height="12" fill="#0f4c81" />
    <rect x="380" y="88" width="240" height="12" fill="#2a6fcb" />
  </g>

  <!-- Graduation cap icon -->
  <g transform="translate(1700,160) scale(1.6)" fill="#ffd166" opacity="0.95">
    <path d="M200 100 L320 40 L440 100 L320 160 z" fill="#ffd166" />
    <rect x="300" y="150" width="40" height="90" rx="6" fill="#ffd166" />
    <circle cx="320" cy="140" r="8" fill="#0b3a63" />
  </g>

  <!-- Light overlay shapes -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="200" cy="700" r="220" />
    <circle cx="800" cy="760" r="160" />
    <circle cx="1400" cy="720" r="180" />
  </g>

  <!-- Decorative diagonal stripe -->
  <rect x="0" y="0" width="2400" height="900" fill="url(#g2)" />

</svg>
